<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="55%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="orbA" cx="20%" cy="22%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="orbB" cx="82%" cy="18%" r="35%">
      <stop offset="0%" stop-color="rgba(56,189,248,0.7)"/>
      <stop offset="70%" stop-color="rgba(56,189,248,0)"/>
    </radialGradient>
    <radialGradient id="orbC" cx="55%" cy="100%" r="55%">
      <stop offset="0%" stop-color="rgba(167,139,250,0.65)"/>
      <stop offset="70%" stop-color="rgba(167,139,250,0)"/>
    </radialGradient>
    <linearGradient id="logoG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="rgba(15,23,42,0.45)"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Floating colour orbs -->
  <rect width="1600" height="900" fill="url(#orbA)"/>
  <rect width="1600" height="900" fill="url(#orbB)"/>
  <rect width="1600" height="900" fill="url(#orbC)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
    <line x1="320" y1="0" x2="320" y2="900"/>
    <line x1="640" y1="0" x2="640" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
  </g>

  <!-- Floating decorative glass cards (background) -->
  <g filter="url(#cardShadow)">
    <rect x="120" y="170" width="220" height="280" rx="28"
          fill="rgba(255,255,255,0.18)"
          stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
    <rect x="155" y="200" width="150" height="20" rx="6" fill="rgba(255,255,255,0.55)"/>
    <rect x="155" y="232" width="100" height="14" rx="5" fill="rgba(255,255,255,0.35)"/>
    <rect x="155" y="280" width="150" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
    <rect x="155" y="280" width="105" height="6" rx="3" fill="rgba(186,230,253,0.85)"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1260" y="160" width="220" height="280" rx="28"
          fill="rgba(255,255,255,0.18)"
          stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
    <circle cx="1370" cy="270" r="56" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="9"/>
    <circle cx="1370" cy="270" r="56" fill="none" stroke="#bae6fd" stroke-width="9"
            stroke-linecap="round" stroke-dasharray="351.86"
            stroke-dashoffset="78"/>
    <text x="1370" y="282" font-family="Inter, sans-serif" font-weight="900" font-size="32"
          fill="#ffffff" text-anchor="middle" letter-spacing="-1">78%</text>
    <rect x="1295" y="370" width="150" height="14" rx="5" fill="rgba(255,255,255,0.4)"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="100" y="540" width="220" height="200" rx="28"
          fill="rgba(255,255,255,0.18)"
          stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
    <rect x="135" y="575" width="150" height="18" rx="6" fill="rgba(255,255,255,0.45)"/>
    <rect x="135" y="610" width="80" height="12" rx="5" fill="rgba(255,255,255,0.3)"/>
    <rect x="135" y="640" width="150" height="50" rx="14" fill="rgba(255,255,255,0.18)"
          stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1280" y="500" width="220" height="240" rx="28"
          fill="rgba(255,255,255,0.18)"
          stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
    <rect x="1310" y="535" width="160" height="18" rx="6" fill="rgba(255,255,255,0.4)"/>
    <rect x="1310" y="570" width="100" height="12" rx="5" fill="rgba(255,255,255,0.28)"/>
    <rect x="1310" y="610" width="160" height="6" rx="3" fill="rgba(255,255,255,0.22)"/>
    <rect x="1310" y="610" width="65" height="6" rx="3" fill="#bae6fd"/>
    <rect x="1310" y="650" width="160" height="6" rx="3" fill="rgba(255,255,255,0.22)"/>
    <rect x="1310" y="650" width="135" height="6" rx="3" fill="#a5b4fc"/>
  </g>

  <!-- Centerpiece: glass card with LB logo and title -->
  <g filter="url(#cardShadow)">
    <rect x="430" y="220" width="740" height="460" rx="40"
          fill="rgba(255,255,255,0.22)"
          stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
    <!-- Top inner highlight -->
    <rect x="430" y="220" width="740" height="160" rx="40"
          fill="url(#orbA)" opacity="0.35"/>
  </g>

  <!-- LB logo (rounded square) -->
  <g transform="translate(800, 320)">
    <rect x="-90" y="-90" width="180" height="180" rx="42"
          fill="url(#logoG)"
          stroke="rgba(255,255,255,0.7)" stroke-width="2"
          filter="url(#cardShadow)"/>
    <text x="0" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="92"
          fill="#4338ca" text-anchor="middle" letter-spacing="-4">LB</text>
  </g>

  <!-- Headline -->
  <text x="800" y="500" font-family="Inter, sans-serif" font-weight="900" font-size="64"
        fill="#ffffff" text-anchor="middle" letter-spacing="-2">САЙТ ОНОВЛЕНО</text>

  <text x="800" y="552" font-family="Inter, sans-serif" font-weight="600" font-size="22"
        fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0.5">
    White Liquid Glass · легко · світло · зручно
  </text>

  <!-- Pills row -->
  <g transform="translate(800, 600)">
    <g transform="translate(-260, 0)">
      <rect x="0" y="0" width="160" height="44" rx="22"
            fill="rgba(255,255,255,0.18)"
            stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
      <text x="80" y="29" font-family="Inter, sans-serif" font-weight="700" font-size="14"
            fill="#ffffff" text-anchor="middle" letter-spacing="0.4">Локалізації</text>
    </g>
    <g transform="translate(-80, 0)">
      <rect x="0" y="0" width="160" height="44" rx="22"
            fill="rgba(255,255,255,0.18)"
            stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
      <text x="80" y="29" font-family="Inter, sans-serif" font-weight="700" font-size="14"
            fill="#ffffff" text-anchor="middle" letter-spacing="0.4">Лаунчер</text>
    </g>
    <g transform="translate(100, 0)">
      <rect x="0" y="0" width="160" height="44" rx="22"
            fill="rgba(255,255,255,0.28)"
            stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
      <text x="80" y="29" font-family="Inter, sans-serif" font-weight="700" font-size="14"
            fill="#ffffff" text-anchor="middle" letter-spacing="0.4">Підтримка</text>
    </g>
  </g>

  <!-- Sparkle accents -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="265" cy="120" r="4"/>
    <circle cx="1340" cy="80" r="5"/>
    <circle cx="1170" cy="780" r="3"/>
    <circle cx="450" cy="780" r="4"/>
    <circle cx="80" cy="450" r="3"/>
  </g>
</svg>
