<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f7fc"/>
      <stop offset="55%" stop-color="#eef2fb"/>
      <stop offset="100%" stop-color="#eaf2fb"/>
    </linearGradient>
    <radialGradient id="orbA" cx="14%" cy="18%" r="42%">
      <stop offset="0%" stop-color="rgba(129, 140, 248, 0.55)"/>
      <stop offset="70%" stop-color="rgba(129, 140, 248, 0)"/>
    </radialGradient>
    <radialGradient id="orbB" cx="88%" cy="22%" r="38%">
      <stop offset="0%" stop-color="rgba(56, 189, 248, 0.50)"/>
      <stop offset="70%" stop-color="rgba(56, 189, 248, 0)"/>
    </radialGradient>
    <radialGradient id="orbC" cx="55%" cy="105%" r="55%">
      <stop offset="0%" stop-color="rgba(20, 184, 166, 0.40)"/>
      <stop offset="70%" stop-color="rgba(20, 184, 166, 0)"/>
    </radialGradient>
    <linearGradient id="logoG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="rgba(15,23,42,0.30)"/>
    </filter>
    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="rgba(99,102,241,0.55)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orbA)"/>
  <rect width="1200" height="630" fill="url(#orbB)"/>
  <rect width="1200" height="630" fill="url(#orbC)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(15, 23, 42, 0.04)" stroke-width="1">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Decorative side card: progress ring -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="180" width="180" height="180" rx="26"
          fill="rgba(255,255,255,0.78)"
          stroke="rgba(255,255,255,0.95)" stroke-width="1.5"/>
    <circle cx="150" cy="278" r="46" fill="none" stroke="rgba(15,23,42,0.08)" stroke-width="9"/>
    <circle cx="150" cy="278" r="46" fill="none" stroke="url(#logoG)" stroke-width="9"
            stroke-linecap="round" stroke-dasharray="289.03"
            stroke-dashoffset="86" transform="rotate(-90 150 278)"/>
    <text x="150" y="288" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="26"
          fill="#0f172a" text-anchor="middle" letter-spacing="-1">70%</text>
    <rect x="100" y="218" width="100" height="10" rx="4" fill="rgba(15,23,42,0.18)"/>
  </g>

  <!-- Decorative side card: catalog list -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="395" width="200" height="180" rx="26"
          fill="rgba(255,255,255,0.78)"
          stroke="rgba(255,255,255,0.95)" stroke-width="1.5"/>
    <rect x="84" y="421" width="120" height="14" rx="5" fill="rgba(99,102,241,0.42)"/>
    <rect x="84" y="445" width="80" height="10" rx="4" fill="rgba(15,23,42,0.18)"/>
    <rect x="84" y="478" width="152" height="6" rx="3" fill="rgba(15,23,42,0.08)"/>
    <rect x="84" y="478" width="106" height="6" rx="3" fill="#6366f1"/>
    <rect x="84" y="498" width="152" height="6" rx="3" fill="rgba(15,23,42,0.08)"/>
    <rect x="84" y="498" width="68" height="6" rx="3" fill="#0ea5e9"/>
    <rect x="84" y="518" width="152" height="6" rx="3" fill="rgba(15,23,42,0.08)"/>
    <rect x="84" y="518" width="138" height="6" rx="3" fill="#10b981"/>
    <rect x="84" y="540" width="62" height="22" rx="11" fill="rgba(99,102,241,0.10)" stroke="rgba(99,102,241,0.32)"/>
  </g>

  <!-- Decorative side card top right: status pills -->
  <g filter="url(#cardShadow)">
    <rect x="960" y="180" width="190" height="160" rx="26"
          fill="rgba(255,255,255,0.78)"
          stroke="rgba(255,255,255,0.95)" stroke-width="1.5"/>
    <rect x="985" y="210" width="80" height="22" rx="11" fill="rgba(139,92,246,0.14)" stroke="rgba(139,92,246,0.38)"/>
    <rect x="1075" y="210" width="60" height="22" rx="11" fill="rgba(14,165,233,0.14)" stroke="rgba(14,165,233,0.38)"/>
    <rect x="985" y="244" width="64" height="22" rx="11" fill="rgba(245,158,11,0.14)" stroke="rgba(245,158,11,0.38)"/>
    <rect x="1059" y="244" width="74" height="22" rx="11" fill="rgba(16,185,129,0.14)" stroke="rgba(16,185,129,0.38)"/>
    <rect x="985" y="296" width="148" height="6" rx="3" fill="rgba(15,23,42,0.08)"/>
    <rect x="985" y="296" width="92" height="6" rx="3" fill="#6366f1"/>
    <rect x="985" y="314" width="148" height="6" rx="3" fill="rgba(15,23,42,0.08)"/>
    <rect x="985" y="314" width="118" height="6" rx="3" fill="#10b981"/>
  </g>

  <!-- Decorative side card bottom right: stats -->
  <g filter="url(#cardShadow)">
    <rect x="960" y="395" width="190" height="180" rx="26"
          fill="rgba(255,255,255,0.78)"
          stroke="rgba(255,255,255,0.95)" stroke-width="1.5"/>
    <rect x="985" y="421" width="40" height="40" rx="12" fill="#6366f1"/>
    <text x="1005" y="448" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="14" fill="#fff" text-anchor="middle">28</text>
    <rect x="1035" y="425" width="100" height="14" rx="5" fill="rgba(15,23,42,0.30)"/>
    <rect x="1035" y="446" width="74" height="10" rx="4" fill="rgba(15,23,42,0.18)"/>
    <rect x="985" y="478" width="40" height="40" rx="12" fill="#0ea5e9"/>
    <text x="1005" y="505" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="14" fill="#fff" text-anchor="middle">33K</text>
    <rect x="1035" y="482" width="100" height="14" rx="5" fill="rgba(15,23,42,0.30)"/>
    <rect x="1035" y="503" width="74" height="10" rx="4" fill="rgba(15,23,42,0.18)"/>
    <rect x="985" y="535" width="40" height="40" rx="12" fill="#10b981"/>
    <text x="1005" y="562" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="14" fill="#fff" text-anchor="middle">±5</text>
    <rect x="1035" y="539" width="100" height="14" rx="5" fill="rgba(15,23,42,0.30)"/>
    <rect x="1035" y="560" width="74" height="10" rx="4" fill="rgba(15,23,42,0.18)"/>
  </g>

  <!-- Centerpiece DARK glass card -->
  <g filter="url(#cardShadow)">
    <rect x="290" y="120" width="620" height="390" rx="36"
          fill="rgba(15,23,42,0.86)"
          stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
    <!-- Top sheen -->
    <rect x="290" y="120" width="620" height="120" rx="36" fill="url(#cardSheen)"/>
  </g>

  <!-- LB logo on dark card -->
  <g transform="translate(600, 215)" filter="url(#logoShadow)">
    <rect x="-50" y="-50" width="100" height="100" rx="24"
          fill="url(#logoG)"
          stroke="rgba(255,255,255,0.20)" stroke-width="1.5"/>
    <text x="0" y="12" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="48"
          fill="#ffffff" text-anchor="middle" letter-spacing="-2">LB</text>
  </g>

  <!-- Eyebrow pill -->
  <g transform="translate(600, 295)">
    <rect x="-128" y="0" width="256" height="30" rx="15"
          fill="rgba(99,102,241,0.18)" stroke="rgba(99,102,241,0.42)" stroke-width="1.2"/>
    <text x="0" y="20" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="12"
          fill="#a5b4fc" text-anchor="middle" letter-spacing="2.8">«LITTLE BIT» — ЛОКАЛІЗАЦІЇ</text>
  </g>

  <!-- Headline -->
  <text x="600" y="385" font-family="Manrope, Inter, system-ui, sans-serif" font-weight="800" font-size="44"
        fill="#ffffff" text-anchor="middle" letter-spacing="-1.5">Перекладаємо те,</text>
  <text x="600" y="438" font-family="Manrope, Inter, system-ui, sans-serif" font-weight="800" font-size="44"
        fill="#a5b4fc" text-anchor="middle" letter-spacing="-1.5">у що самі граємо</text>

  <!-- Subtitle -->
  <text x="600" y="478" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="17"
        fill="rgba(255,255,255,0.72)" text-anchor="middle">Сюжет, інтерфейс і дрібниці — українською.</text>

  <!-- Bottom URL stripe -->
  <g transform="translate(600, 580)">
    <rect x="-220" y="-18" width="440" height="36" rx="18"
          fill="rgba(255,255,255,0.85)" stroke="rgba(255,255,255,0.95)" stroke-width="1"/>
    <text x="0" y="6" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="13"
          fill="#0f172a" text-anchor="middle" letter-spacing="0.5">littlebitua.github.io · Yakuza · Judgment · NMH · MGS</text>
  </g>

  <!-- Decorative sparkles -->
  <g fill="#6366f1" opacity="0.55">
    <circle cx="200" cy="100" r="3"/>
    <circle cx="1000" cy="80" r="4"/>
    <circle cx="900" cy="540" r="3"/>
    <circle cx="280" cy="560" r="3"/>
  </g>
</svg>
