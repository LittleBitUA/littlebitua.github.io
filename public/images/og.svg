<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f7fc"/>
      <stop offset="55%" stop-color="#eef2fb"/>
      <stop offset="100%" stop-color="#f7f4ff"/>
    </linearGradient>
    <radialGradient id="orbA" cx="15%" cy="20%" r="40%">
      <stop offset="0%" stop-color="rgba(129, 140, 248, 0.55)"/>
      <stop offset="70%" stop-color="rgba(129, 140, 248, 0)"/>
    </radialGradient>
    <radialGradient id="orbB" cx="88%" cy="22%" r="38%">
      <stop offset="0%" stop-color="rgba(56, 189, 248, 0.50)"/>
      <stop offset="70%" stop-color="rgba(56, 189, 248, 0)"/>
    </radialGradient>
    <radialGradient id="orbC" cx="55%" cy="100%" r="55%">
      <stop offset="0%" stop-color="rgba(167, 139, 250, 0.50)"/>
      <stop offset="70%" stop-color="rgba(167, 139, 250, 0)"/>
    </radialGradient>
    <linearGradient id="logoG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glassShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="rgba(15,23,42,0.18)"/>
    </filter>
    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="rgba(99,102,241,0.55)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orbA)"/>
  <rect width="1200" height="630" fill="url(#orbB)"/>
  <rect width="1200" height="630" fill="url(#orbC)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(15, 23, 42, 0.04)" stroke-width="1">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Decorative side glass cards -->
  <g filter="url(#glassShadow)">
    <rect x="56" y="160" width="170" height="200" rx="24"
          fill="rgba(255,255,255,0.65)"
          stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
    <rect x="84" y="186" width="114" height="14" rx="5" fill="rgba(99,102,241,0.4)"/>
    <rect x="84" y="208" width="74" height="10" rx="4" fill="rgba(15,23,42,0.18)"/>
    <rect x="84" y="246" width="114" height="6" rx="3" fill="rgba(15,23,42,0.08)"/>
    <rect x="84" y="246" width="78" height="6" rx="3" fill="url(#logoG)"/>
    <rect x="84" y="266" width="60" height="22" rx="11" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.28)"/>
  </g>

  <g filter="url(#glassShadow)">
    <rect x="970" y="135" width="180" height="180" rx="26"
          fill="rgba(255,255,255,0.65)"
          stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
    <circle cx="1060" cy="230" r="46" fill="none" stroke="rgba(15,23,42,0.08)" stroke-width="9"/>
    <circle cx="1060" cy="230" r="46" fill="none" stroke="url(#logoG)" stroke-width="9"
            stroke-linecap="round" stroke-dasharray="289.03"
            stroke-dashoffset="64"/>
    <text x="1060" y="240" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="26"
          fill="#0f172a" text-anchor="middle" letter-spacing="-1">78%</text>
    <rect x="1010" y="170" width="80" height="10" rx="4" fill="rgba(15,23,42,0.18)"/>
  </g>

  <g filter="url(#glassShadow)">
    <rect x="40" y="400" width="200" height="170" rx="26"
          fill="rgba(255,255,255,0.65)"
          stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
    <rect x="68" y="426" width="120" height="14" rx="5" fill="rgba(99,102,241,0.35)"/>
    <rect x="68" y="450" width="74" height="10" rx="4" fill="rgba(15,23,42,0.18)"/>
    <rect x="68" y="486" width="144" height="36" rx="12" fill="rgba(99,102,241,0.10)" stroke="rgba(99,102,241,0.28)"/>
  </g>

  <g filter="url(#glassShadow)">
    <rect x="975" y="400" width="180" height="170" rx="26"
          fill="rgba(255,255,255,0.65)"
          stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
    <rect x="1005" y="430" width="120" height="14" rx="5" fill="rgba(99,102,241,0.35)"/>
    <rect x="1005" y="454" width="80" height="10" rx="4" fill="rgba(15,23,42,0.18)"/>
    <rect x="1005" y="492" width="120" height="6" rx="3" fill="rgba(15,23,42,0.08)"/>
    <rect x="1005" y="492" width="60" height="6" rx="3" fill="url(#logoG)"/>
    <rect x="1005" y="510" width="120" height="6" rx="3" fill="rgba(15,23,42,0.08)"/>
    <rect x="1005" y="510" width="92" height="6" rx="3" fill="url(#logoG)"/>
  </g>

  <!-- Centerpiece glass card -->
  <g filter="url(#glassShadow)">
    <rect x="280" y="120" width="640" height="390" rx="36"
          fill="rgba(255,255,255,0.78)"
          stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
  </g>

  <!-- LB logo -->
  <g transform="translate(600, 215)" filter="url(#logoShadow)">
    <rect x="-58" y="-58" width="116" height="116" rx="28"
          fill="url(#logoG)"
          stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
    <text x="0" y="14" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="58"
          fill="#ffffff" text-anchor="middle" letter-spacing="-2">LB</text>
  </g>

  <!-- Eyebrow pill -->
  <g transform="translate(600, 305)">
    <rect x="-115" y="0" width="230" height="32" rx="16"
          fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.28)" stroke-width="1.2"/>
    <text x="0" y="22" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="13"
          fill="#4338ca" text-anchor="middle" letter-spacing="2.5">«LITTLE BIT» — ЛОКАЛІЗАЦІЇ</text>
  </g>

  <!-- Headline -->
  <text x="600" y="395" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="48"
        fill="#0f172a" text-anchor="middle" letter-spacing="-1.5">Перекладаємо те,</text>
  <text x="600" y="448" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="48"
        fill="url(#textGrad)" text-anchor="middle" letter-spacing="-1.5">у що самі граємо</text>

  <!-- Subtitle -->
  <text x="600" y="488" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="18"
        fill="#475569" text-anchor="middle">Сюжет, інтерфейс і дрібниці — українською.</text>

  <!-- Bottom URL -->
  <text x="600" y="588" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14"
        fill="#64748b" text-anchor="middle" letter-spacing="0.5">littlebitua.github.io · Yakuza · Judgment · NMH · MGS</text>

  <!-- Decorative sparkles -->
  <g fill="#6366f1" opacity="0.5">
    <circle cx="200" cy="100" r="3"/>
    <circle cx="1000" cy="80" r="4"/>
    <circle cx="900" cy="540" r="3"/>
    <circle cx="280" cy="560" r="3"/>
  </g>
</svg>
